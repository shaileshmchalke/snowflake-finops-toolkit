# Snowflake FinOps Toolkit — Connection Configuration
# Author: Shailesh Chalke — Senior Snowflake Consultant
# NOTE: Sensitive values (passwords, keys) must be set in .env file.
#       This file contains only non-sensitive configuration defaults.

snowflake:
  # Account identifier format: <org_name>-<account_name> or <locator>.<region>.<cloud>
  # Example: myorg-myaccount OR xy12345.us-east-1.aws
  account_env_var: SNOWFLAKE_ACCOUNT

  # Authentication (choose ONE — set in .env)
  auth:
    method: password          # Options: password | keypair
    user_env_var: SNOWFLAKE_USER
    password_env_var: SNOWFLAKE_PASSWORD
    private_key_path_env_var: SNOWFLAKE_PRIVATE_KEY_PATH
    private_key_passphrase_env_var: SNOWFLAKE_PRIVATE_KEY_PASSPHRASE

  # Default connection targets
  defaults:
    warehouse: COMPUTE_WH
    database: FINOPS_DEMO
    schema: FINOPS_SAMPLE
    role: SYSADMIN

  # Session configuration
  session:
    query_tag: FINOPS_TOOLKIT
    statement_timeout_seconds: 300
    lock_timeout_seconds: 60
    use_cached_result: true
    client_session_keep_alive: true

# FinOps business settings
finops:
  # Credit pricing (update based on your contract)
  credit_pricing:
    on_demand_usd: 3.00
    enterprise_usd: 2.00    # Typical enterprise discount
    business_critical_usd: 3.00

  # Optimization thresholds
  thresholds:
    # Auto-suspend recommendations by workload type (seconds)
    auto_suspend:
      BI: 300         # Preserves result cache (5 min)
      ETL: 120        # Fast suspend for batch (2 min)
      AD_HOC: 60      # Minimize idle for interactive (1 min)
      DS: 600         # Long-running notebooks (10 min)
      UNKNOWN: 120    # Safe default (2 min)

    # Right-sizing thresholds
    low_utilization_pct: 25   # Below this → consider downsizing
    high_spill_pct: 10        # Above this → consider upsizing

    # Anomaly detection
    spike_z_score: 3.0        # Z-score threshold for spike alert
    creep_consecutive_days: 7  # Days of consecutive increase = slow creep

    # Cloud services health
    cloud_services_warning_pct: 10  # Alert if cloud svc > 10% of compute

# Sample data configuration
sample_data:
  database: FINOPS_DEMO
  schema: FINOPS_SAMPLE
  tables:
    metering: WH_METERING_HISTORY
    user_attribution: USER_ATTRIBUTION
  generation:
    num_warehouses: 12
    days: 28
    seed: 42

# Dashboard settings
dashboard:
  refresh_ttl_seconds: 300     # Cache TTL for most data
  configurator_ttl_seconds: 600 # Cache TTL for configurator
  max_warehouses_display: 50
  chart_theme: plotly_dark